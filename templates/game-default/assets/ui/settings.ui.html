<section class="settings" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
  <div class="backdrop" data-ui-action="close-settings"></div>
  <div class="panel" role="document" tabindex="-1">
    <h2 id="settings-title">Game settings</h2>
    <label>Music <input data-ui-setting="music" type="range" min="0" max="100" value="70"></label>
    <label><input data-ui-setting="high-contrast" type="checkbox"> High contrast</label>
    <button type="button" data-ui-action="close-settings">Done</button>
  </div>
</section>
