<section class="hud" aria-label="Game HUD">
  <span data-ui-slot="score" aria-live="polite">Score 0</span>
  <button type="button" data-ui-action="toggle-mode" aria-label="Toggle view mode">View: top-down</button>
  <button type="button" class="settings-action" data-ui-action="open-settings" aria-label="Open settings">Settings</button>
  <span data-ui-slot="lock-status" aria-live="polite"></span>
  <span data-ui-slot="hint"></span>
  <span data-ui-slot="crosshair" aria-hidden="true">+</span>
  <div data-ui-slot="popups" aria-live="polite"></div>
  <template data-ui-template="score-popup"><span class="score-popup"></span></template>
</section>
