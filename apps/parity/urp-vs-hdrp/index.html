<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forgeax-engine - parity-urp-vs-hdrp fixture</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #d8dde8;
        font-family: system-ui, sans-serif;
      }
      .row {
        display: flex;
        flex-direction: row;
        gap: 0;
      }
      .pane {
        position: relative;
      }
      .pane label {
        position: absolute;
        top: 8px;
        left: 8px;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.55);
        padding: 4px 8px;
        border-radius: 4px;
        pointer-events: none;
      }
      canvas {
        display: block;
        width: 512px;
        height: 512px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="pane">
        <label>URP-4-light</label>
        <canvas id="urp" width="512" height="512"></canvas>
      </div>
      <div class="pane">
        <label>HDRP-4-light</label>
        <canvas id="hdrp" width="512" height="512"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
