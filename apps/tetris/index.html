<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forgeax-engine - Tetris</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a14;
        color: #e0e6f8;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      canvas {
        display: block;
        width: 100vmin;
        height: 100vmin;
        max-width: 100vw;
        max-height: 100vh;
      }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-size: 14px;
        line-height: 1.5;
        background: rgba(10, 10, 20, 0.55);
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid #2a2f48;
        backdrop-filter: blur(4px);
        pointer-events: none;
        user-select: none;
        min-width: 160px;
      }
      #hud h1 {
        margin: 0 0 8px 0;
        font-size: 16px;
        letter-spacing: 0.08em;
        color: #9fb4ff;
      }
      #hud .row { display: flex; justify-content: space-between; gap: 16px; }
      #hud .label { color: #6c7396; }
      #hud .value { color: #fff; font-variant-numeric: tabular-nums; }
      #help {
        position: fixed;
        bottom: 16px;
        left: 16px;
        font-size: 12px;
        color: #6c7396;
        background: rgba(10, 10, 20, 0.55);
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #2a2f48;
        pointer-events: none;
        user-select: none;
      }
      #help kbd {
        display: inline-block;
        background: #1a1f30;
        color: #c8d2f0;
        border: 1px solid #2f3550;
        border-radius: 3px;
        padding: 0 5px;
        margin: 0 1px;
        font-size: 11px;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: rgba(5, 5, 12, 0.7);
        backdrop-filter: blur(2px);
      }
      #overlay.show { display: grid; }
      #overlay .panel {
        text-align: center;
        padding: 24px 32px;
        background: #11132a;
        border: 1px solid #2f3550;
        border-radius: 10px;
      }
      #overlay h2 { margin: 0 0 8px 0; color: #ff7ab2; letter-spacing: 0.08em; }
      #overlay p { margin: 0 0 16px 0; color: #c8d2f0; }
      #overlay button {
        background: #2a3a78;
        color: #fff;
        border: 1px solid #4458a4;
        border-radius: 6px;
        padding: 8px 20px;
        font-family: inherit;
        font-size: 14px;
        cursor: pointer;
      }
      #overlay button:hover { background: #34488f; }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="app"></canvas>
    </div>
    <div id="hud">
      <h1>TETRIS</h1>
      <div class="row"><span class="label">SCORE</span><span class="value" id="score">0</span></div>
      <div class="row"><span class="label">LINES</span><span class="value" id="lines">0</span></div>
      <div class="row"><span class="label">LEVEL</span><span class="value" id="level">1</span></div>
      <div class="row"><span class="label">NEXT</span><span class="value" id="next">-</span></div>
    </div>
    <div id="help">
      <kbd>&larr;</kbd><kbd>&rarr;</kbd> move &nbsp;
      <kbd>&uarr;</kbd> rotate &nbsp;
      <kbd>&darr;</kbd> soft drop &nbsp;
      <kbd>Space</kbd> hard drop &nbsp;
      <kbd>P</kbd> pause &nbsp;
      <kbd>R</kbd> restart
    </div>
    <div id="overlay">
      <div class="panel">
        <h2 id="overlayTitle">GAME OVER</h2>
        <p id="overlayText">Press R or click to restart</p>
        <button id="restart">Restart</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
