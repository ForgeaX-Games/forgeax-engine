<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forgeax-engine - Hello Multi-Material (multi-prim + mixed-topology)</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #mm-hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-size: 14px;
        line-height: 1.5;
        background: rgba(0, 0, 0, 0.5);
        color: #e0e6f8;
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #2a2f48;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="mm-hud">
      submeshes=2: [0] triangle-list (red filled quad) + [1] line-list (cyan wire box)
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
