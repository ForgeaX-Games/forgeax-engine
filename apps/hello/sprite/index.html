<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forgeax-engine - Hello Sprite (layer-z + JRPG Y-sort)</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #1a1a22; color: #e8e8ef; font-family: ui-monospace, monospace; }
      canvas { display: block; width: 100vw; height: 100vh; }
      .hint {
        position: fixed; left: 12px; top: 12px;
        background: rgba(0, 0, 0, 0.45); padding: 8px 12px;
        border-radius: 6px; line-height: 1.4; pointer-events: none;
      }
      .hint b { color: #ffe57c; }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div class="hint">
      <b>1</b> = scene-A (mode=0, layer-z horizontal)<br />
      <b>2</b> = scene-B (mode=1, JRPG Y-sort foot pivot)<br />
      mouse-wheel up/down = scene-B/A
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
