packages:
  - "packages/*"
  - "apps/*"
  - "apps/hello/*"
  - "apps/bevy/*"
  - "apps/shadertoy/*"
  - "apps/parity/*"
  - "apps/learn-render/*/*"
  - "apps/learn-render/*/*/*"
  - "templates/game-default"

allowBuilds:
  esbuild: true
  simple-git-hooks: true
  webgpu: true

supportedArchitectures:
  os:
    - darwin
    - linux
    - win32
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - musl
